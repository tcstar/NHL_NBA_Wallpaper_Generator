<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NHL + NBA Playoffs Wallpaper</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#111827;}
body{font-family:'Barlow',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}

.toolbar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;flex-shrink:0;}
button{padding:8px 20px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;transition:background .15s;}
button:hover{background:rgba(255,255,255,0.14);}
.btn-u{background:#1d4ed8;border-color:#1d4ed8;}
.btn-u:hover{background:#1e40af;}
#status{color:rgba(255,255,255,0.45);font-size:11px;min-height:16px;text-align:center;flex-shrink:0;}

#wp-scaler{flex-shrink:0;transform-origin:top left;}
#wp{width:1280px;height:720px;background:#070910;position:relative;overflow:hidden;flex-shrink:0;border-radius:6px;display:flex;flex-direction:column;}
#wp::after{content:'';position:absolute;left:0;right:0;top:360px;height:1px;background:rgba(255,255,255,0.07);pointer-events:none;z-index:1;}

.half{width:1280px;height:360px;position:relative;flex-shrink:0;display:flex;flex-direction:column;}
.half-nhl{border-top:2px solid #3b7dd8;}
.half-nba{border-bottom:2px solid #d45f18;}

.wm{position:absolute;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:300px;letter-spacing:-8px;pointer-events:none;user-select:none;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;z-index:0;}
.half-nhl .wm{color:rgba(59,125,216,0.05);}
.half-nba .wm{color:rgba(212,95,24,0.05);}

.hdr{display:flex;align-items:baseline;gap:10px;padding:3px 20px 1px;position:relative;z-index:2;flex-shrink:0;}
.hdr-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:3px;text-transform:uppercase;}
.c-nhl{color:#4a90e8;}.c-nba{color:#e8682a;}
.hdr-sub{font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:2px;text-transform:uppercase;}
.hdr-mode{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:1px 5px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;}
.hdr-mode.projected{background:rgba(250,197,24,0.18);color:#f5c518;}
.hdr-mode.live{background:rgba(74,222,128,0.18);color:#4ade80;}
.hdr-mode.offseason{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.35);}
.hdr-date{margin-left:auto;font-size:8px;color:rgba(255,255,255,0.18);font-family:'Barlow Condensed',sans-serif;}

.bracket{flex:1;min-height:0;display:flex;align-items:stretch;padding:0 20px 0;position:relative;z-index:2;overflow:hidden;}
.r-col{display:flex;flex-direction:column;justify-content:space-around;flex-shrink:0;padding:1px 0;gap:1px;}
.g{width:9px;flex-shrink:0;}
.gf{flex:1;min-width:0;}

.sc{width:145px;background:rgba(255,255,255,0.036);border:1px solid rgba(255,255,255,0.07);border-radius:5px;padding:2px 5px 2px;position:relative;flex-shrink:0;display:flex;flex-direction:column;}
.sc.live{border-color:rgba(74,222,128,0.3);}
.sc.done{border-color:rgba(255,255,255,0.04);}
.sc.projected{border-color:rgba(245,197,24,0.2);}
.sc.fin{width:160px;}
.half-nhl .sc.fin{border-color:rgba(74,144,232,0.3);}
.half-nba .sc.fin{border-color:rgba(232,104,42,0.3);}

.tr{display:flex;align-items:center;gap:4px;height:17px;}
.tr img.lg{width:16px;height:16px;object-fit:contain;flex-shrink:0;}
.lg-fb{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.09);display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:rgba(255,255,255,0.45);flex-shrink:0;}
.t-sd{font-size:7.5px;color:rgba(255,255,255,0.22);width:13px;text-align:right;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;}
.t-nm{font-size:9px;font-weight:600;color:rgba(255,255,255,0.72);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-wn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:rgba(255,255,255,0.28);width:12px;text-align:center;flex-shrink:0;}
.sdiv{height:1px;background:rgba(255,255,255,0.065);margin:0;}

.tr.lead .t-nm{color:#fff;}.tr.lead .t-wn{color:#f5c518;}
.tr.elim .t-nm{color:rgba(255,255,255,0.2);text-decoration:line-through;}
.tr.elim img.lg,.tr.elim .lg-fb{opacity:0.2;}
.tr.tbd  .t-nm{color:rgba(255,255,255,0.26);font-style:italic;}

.ss{position:absolute;top:3px;right:5px;font-family:'Barlow Condensed',sans-serif;font-size:7.5px;font-weight:700;letter-spacing:.3px;color:rgba(255,255,255,0.2);}
.ss.live{color:#4ade80;}.ss.done{color:rgba(255,255,255,0.16);}.ss.proj{color:#f5c518;}

.gl{margin-top:1px;border-top:1px solid rgba(255,255,255,0.06);padding-top:1px;display:grid;grid-template-columns:1fr 1fr;gap:0px 3px;}
.gl-row{display:flex;align-items:baseline;gap:2px;font-family:'Barlow Condensed',sans-serif;font-size:6.5px;color:rgba(255,255,255,0.3);line-height:1.1;white-space:nowrap;overflow:hidden;min-width:0;}
.gl-gn{width:14px;flex-shrink:0;color:rgba(255,255,255,0.15);font-size:6.5px;}
.gl-sc{flex:1;overflow:hidden;text-overflow:ellipsis;letter-spacing:.1px;}
.gl-ot{font-size:6px;color:rgba(255,255,255,0.18);flex-shrink:0;}
.gl-row.glw .gl-sc{color:rgba(255,255,255,0.52);}
.gl-row.gll .gl-sc{color:rgba(255,255,255,0.25);}
.gl-row.glv .gl-sc{color:#4ade80;}
.gl-win{color:rgba(255,255,255,0.75);font-weight:700;}
.gl-los{color:rgba(255,255,255,0.2);}
.gl-row.glv .gl-win,.gl-row.glv .gl-los{color:#4ade80;}

.cc{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex-shrink:0;width:160px;}
.cc-lbl{font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:800;letter-spacing:2px;text-transform:uppercase;text-align:center;}
.half-nhl .cc-lbl{color:#4a90e8;}.half-nba .cc-lbl{color:#e8682a;}
.troph{font-size:16px;line-height:1;}

.rl{font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.16);text-align:center;margin-bottom:1px;white-space:nowrap;flex-shrink:0;}
.conf-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.28);text-align:center;margin-bottom:2px;white-space:nowrap;flex-shrink:0;padding-bottom:2px;border-bottom:1px solid rgba(255,255,255,0.08);}

/* offseason placeholder */
.offseason-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:3;}
.offseason-msg .om-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:4px;text-transform:uppercase;}
.half-nhl .om-title{color:rgba(74,144,232,0.5);}
.half-nba .om-title{color:rgba(232,104,42,0.5);}
.offseason-msg .om-sub{font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}

#foot{position:absolute;bottom:0;left:0;right:0;height:20px;background:rgba(0,0,0,0.55);z-index:5;display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.fl{font-size:8px;color:rgba(255,255,255,0.2);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}

#ldr{display:none;position:absolute;inset:0;background:rgba(7,9,16,0.88);align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:50;border-radius:6px;}
#ldr.on{display:flex;}
.spin{width:26px;height:26px;border:2px solid rgba(255,255,255,0.1);border-top-color:#4a90e8;border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.ltxt{font-size:11px;color:rgba(255,255,255,0.4);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
.cv{position:absolute;inset:0;pointer-events:none;z-index:1;}
</style>

<!-- html2canvas loaded dynamically in exportWP to avoid tracking-prevention blocks -->
<script>
document.getElementById('wp-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

/* ── LOGO HELPER ──
   ESPN CDN logos keyed by ESPN team abbreviation, fetched dynamically.
   We store logo URLs as we discover them from API responses.
*/
const LOGO_CACHE = {};
function logoUrl(espnAbbr, league) {
  if (!espnAbbr) return null;
  const lg = league === 'nhl' ? 'nhl' : 'nba';
  return `https://a.espncdn.com/i/teamlogos/${lg}/500/${espnAbbr.toLowerCase()}.png`;
}
function logoEl(name, url, isTbd) {
  if (isTbd || !name || name === 'TBD') return '<div class="lg-fb">?</div>';
  const ab = name.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
  const src = url || LOGO_CACHE[name];
  if (!src) return `<div class="lg-fb">${ab}</div>`;
  return `<img class="lg" src="${src}" alt="${name}" onerror="this.outerHTML='<div class=lg-fb>${ab}</div>'">`;
}

/* abbreviation for game log */
function abbr(name) {
  if (!name) return '???';
  return name.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
}

/* ── STATE ──
   D holds the current data for each league.
   mode: 'playoffs' | 'projected' | 'offseason'
   year: active season year from ESPN
*/
let D = { nhl: null, nba: null };

function emptyBracket() {
  function tbdSeries() { return {t1:'TBD',s1:'',t2:'TBD',s2:'',w1:0,w2:0,st:'pending',tbd:true,games:[],logo1:null,logo2:null}; }
  return {
    mode: 'offseason',
    year: null,
    trophy: '',
    label: '',
    L: { r1:[tbdSeries(),tbdSeries(),tbdSeries(),tbdSeries()], r2:[tbdSeries(),tbdSeries()], cf:[tbdSeries()] },
    R: { r1:[tbdSeries(),tbdSeries(),tbdSeries(),tbdSeries()], r2:[tbdSeries(),tbdSeries()], cf:[tbdSeries()] },
    final: tbdSeries(),
  };
}

/* ── ESPN FETCH ──
   Direct fetch to ESPN's public API. Works from any proper HTTP origin
   (http://localhost, https://github.io, etc.). Will not work from file://.
*/
async function espnFetch(url) {
  if (window.location.protocol === 'file:') {
    throw new Error('Cannot fetch from file:// — use the Python server: python -m http.server 8000');
  }
  const r = await fetch(url);
  if (!r.ok) throw new Error('ESPN fetch failed (' + r.status + '): ' + url);
  return r.json();
}

/* ── PLAYOFF YEAR FROM DATE ──
   Both NHL and NBA seasons start in October and run through the
   following spring. Playoffs are named after the calendar year in
   which they occur (e.g. the 2025-26 season → 2026 playoffs).

   Rule:
     - On or after November 1  → new season has begun → playoff year = next calendar year
     - Before November 1       → still in the previous season → playoff year = current year

   Examples (today → playoff year):
     Oct 15 2025  → 2026  (season just started but not yet Nov 1, so still 2025-26 → 2026)
     Nov 3  2025  → 2026  (past Nov 1 cutoff, season is 2025-26 → 2026)
     Apr 16 2026  → 2026  (playoffs are happening right now)
     Sep 20 2026  → 2027  (before Nov 1, new 2026-27 season → 2027)

   Wait — October is tricky: the NEW season starts in October, so
   Oct 1 2025 is the START of the 2025-26 season → playoff year 2026.
   Therefore: month >= 10 (Oct or later) → playoff year = currentYear + 1
              month < 10 (Jan–Sep)       → playoff year = currentYear
*/
function getPlayoffYear() {
  const now   = new Date();
  const month = now.getMonth() + 1; /* 1-12 */
  const year  = now.getFullYear();
  /* November 1 cutoff: Oct = month 10, Nov = month 11
     From Nov 1 onward the new season is established enough to use.
     October is the very first weeks of the new season — also use next year. */
  return month >= 10 ? year + 1 : year;
}

/* Fetch current standings for building projected bracket.
   Returns array of { name, abbr, logoUrl, wins, losses, divisionId, divisionName, conferenceId } */
async function fetchStandings(sport, league) {
  const j = await espnFetch(
    `https://site.web.api.espn.com/apis/v2/sports/${sport}/${league}/standings?type=0&level=3&sort=playoffseed:asc,points:desc,gamesplayed:asc`
  );

  /* ESPN standings structure (observed):
     j.children = [ conferenceNode, conferenceNode ]
     Each conferenceNode has:
       .id, .name, .abbreviation
       .standings.entries = [ { team, stats }, ... ]   ← FLAT (no division nesting for NHL)
       OR .children = [ divisionNode, ... ]             ← nested (some leagues)
     We handle both shapes. */

  const entries = [];

  function parseEntries(node, confId, confName, divId, divName) {
    const stEntries = node.standings?.entries || [];
    for (const e of stEntries) {
      const team  = e.team || {};
      const stats = {};
      for (const s of (e.stats || [])) { stats[s.name] = s.value; }
      const w = stats.wins || stats.gamesWon || 0;
      const l = stats.losses || stats.gamesLost || 0;
      entries.push({
        name:         team.displayName || team.name || '',
        abbr:         team.abbreviation || '',
        logoUrl:      team.logos?.[0]?.href || logoUrl(team.abbreviation, league),
        wins:         w,
        losses:       l,
        pct:          stats.winPercent || stats.winPct || (w / Math.max(1, w + l)),
        points:       stats.points || 0,
        playoffSeed:  stats.playoffSeed || stats.clincher || 0,
        divisionId:   divId,
        divisionName: divName,
        confId:       confId,
        confName:     confName,
        confAbbr:     node.abbreviation || '',
      });
    }
  }

  for (const conf of (j.children || [])) {
    const cId   = conf.id   || '';
    const cName = conf.name || conf.abbreviation || '';

    if (conf.children && conf.children.length > 0) {
      /* Nested: conference → division → teams */
      for (const div of conf.children) {
        const dId   = div.id   || cId;
        const dName = div.name || '';
        parseEntries(div, cId, cName, cId + '_' + dId, dName);
      }
    } else {
      /* Flat: conference → teams directly (NHL uses this) */
      parseEntries(conf, cId, cName, cId, cName);
    }
  }

  return entries;
}

/* Fetch all playoff games from the start of playoffs to today.
   The default scoreboard only returns today/tomorrow's games.
   Using a date range (April 1 → today) ensures we get all completed
   games so the per-game score log is populated correctly.
   We filter to only events with a series object (real playoff games).
*/
async function fetchPlayoffGames(sport, league) {
  const year = getPlayoffYear();
  /* Build date range: April 1 of playoff year → today */
  const start = `${year}0401`;
  const now   = new Date();
  const end   = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const url   = `https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/scoreboard?seasontype=3&limit=200&dates=${start}-${end}`;
  const j = await espnFetch(url);
  const events = j.events || [];
  /* Keep only events with a series object — these are real playoff games */
  return events.filter(ev => {
    const series = ev.competitions?.[0]?.series;
    return series && series.competitors && series.competitors.length > 0;
  });
}

/* ── BUILD PROJECTED NHL BRACKET FROM STANDINGS ──
   NHL R1 format (division-based, not simple 1-8 seeding):
   Per conference, two divisions each contribute 3 teams.
   Two wild cards fill slots 7 & 8 (best remaining across both divs).

   R1 matchups:
     Best div winner (most pts)     vs WC2
     Best div 2nd place             vs Best div 3rd place
     Other div winner               vs WC1
     Other div 2nd place            vs Other div 3rd place

   We use the ESPN web standings API (level=3) which returns
   conference → division → teams with playoffSeed stats.
*/
function buildNHLProjected(standings, year) {
  const d = emptyBracket();
  d.mode   = 'projected';
  d.year   = year;
  d.trophy = '🏒';
  d.label  = 'Stanley Cup Final';

  function ms(t1, t2, s1, s2) {
    if (!t1) return {t1:'TBD',s1:s1||'',t2:t2?.name||'TBD',s2:s2||'',w1:0,w2:0,st:'pending',tbd:true,games:[],logo1:null,logo2:t2?.logoUrl||null,projected:true};
    if (!t2) return {t1:t1.name,s1,t2:'TBD',s2:s2||'',w1:0,w2:0,st:'pending',tbd2:true,games:[],logo1:t1.logoUrl||null,logo2:null,projected:true};
    LOGO_CACHE[t1.name] = t1.logoUrl; LOGO_CACHE[t2.name] = t2.logoUrl;
    return {t1:t1.name,s1,t2:t2.name,s2,w1:0,w2:0,st:'pending',tbd:false,games:[],logo1:t1.logoUrl||null,logo2:t2.logoUrl||null,projected:true};
  }

  /* Group by conference then division using divisionId */
  const confs = {};
  for (const t of standings) {
    const ck = t.confId || t.confName || 'unk';
    const dk = t.divisionId || 'unk';
    if (!confs[ck]) confs[ck] = { name: t.confName||'', abbr: t.confAbbr||'', divs: {} };
    if (!confs[ck].divs[dk]) confs[ck].divs[dk] = { name: t.divisionName||'', teams: [] };
    confs[ck].divs[dk].teams.push(t);
  }

  const confKeys = Object.keys(confs);
  if (confKeys.length < 2) return d;

  let eastKey = confKeys.find(k => /east/i.test(confs[k].name||'') || /^east$/i.test(confs[k].abbr||''));
  let westKey = confKeys.find(k => /west/i.test(confs[k].name||'') || /^west$/i.test(confs[k].abbr||''));
  if (!eastKey && !westKey) { westKey = confKeys[0]; eastKey = confKeys[1]; }
  else if (!eastKey) { eastKey = confKeys.find(k => k !== westKey) || confKeys[1]; }
  else if (!westKey) { westKey = confKeys.find(k => k !== eastKey) || confKeys[0]; }
  if (eastKey === westKey) { eastKey = confKeys[0]; westKey = confKeys[1]; }

  function fillSide(confKey, side) {
    const conf = confs[confKey];
    const divKeys = Object.keys(conf.divs);

    /* Sort each division's teams by playoff seed then points */
    const sortDiv = dk => conf.divs[dk].teams
      .filter(t => t.name)
      .sort((a,b) => (a.playoffSeed||99) - (b.playoffSeed||99) || (b.points||0) - (a.points||0));

    /* Get all teams sorted by points to find wild cards */
    const allTeams = Object.values(conf.divs)
      .flatMap(div => div.teams.filter(t => t.name))
      .sort((a,b) => (b.points||0) - (a.points||0));

    if (divKeys.length >= 2) {
      /* Division-based bracket */
      const divTeams = divKeys.map(dk => sortDiv(dk));

      /* Top 3 from each division are the div's playoff qualifiers */
      const div1 = divTeams[0].slice(0, 3);
      const div2 = divTeams[1].slice(0, 3);

      /* Wild cards = best remaining teams not in top 3 of any division */
      const inTop3 = new Set([...div1, ...div2].map(t => t.name));
      const wcs = allTeams.filter(t => !inTop3.has(t.name)).slice(0, 2);
      const wc1 = wcs[0], wc2 = wcs[1];

      /* Best division winner = div winner with more points */
      const dw1 = div1[0], dw2 = div2[0];
      const bestDiv   = (dw1?.points||0) >= (dw2?.points||0) ? div1 : div2;
      const otherDiv  = bestDiv === div1 ? div2 : div1;

      /* NHL R1: best div winner vs WC2, best div 2+3 vs each other,
                other div winner vs WC1, other div 2+3 vs each other */
      side.r1[0] = ms(bestDiv[0],  wc2,         'D1-1', 'WC2');
      side.r1[1] = ms(bestDiv[1],  bestDiv[2],  'D1-2', 'D1-3');
      side.r1[2] = ms(otherDiv[0], wc1,         'D2-1', 'WC1');
      side.r1[3] = ms(otherDiv[1], otherDiv[2], 'D2-2', 'D2-3');
    } else {
      /* Flat fallback: seed 1v8, 2v7, 3v6, 4v5 */
      const teams = allTeams.slice(0, 8);
      const [s1,s2,s3,s4,s5,s6,s7,s8] = teams;
      side.r1[0] = ms(s1, s8||null, '1', '8');
      side.r1[1] = ms(s2, s7||null, '2', '7');
      side.r1[2] = ms(s3, s6||null, '3', '6');
      side.r1[3] = ms(s4, s5||null, '4', '5');
    }
  }

  fillSide(westKey, d.L);
  fillSide(eastKey, d.R);
  return d;
}

/* ── BUILD PROJECTED NBA BRACKET FROM STANDINGS ──
   NBA: top-6 per conference directly + 2 play-in (seeds 7/8 from 7-10 game).
   R1: 1v8, 2v7, 3v6, 4v5 per conference.
*/
function buildNBAProjected(standings, year) {
  const d = emptyBracket();
  d.mode  = 'projected';
  d.year  = year;
  d.trophy = '🏀';
  d.label  = 'NBA Finals';

  const confs = {};
  for (const t of standings) {
    const ck = t.confId || t.confName || 'unk';
    if (!confs[ck]) confs[ck] = { name: t.confName || '', abbr: t.confAbbr || '', teams: [] };
    confs[ck].teams.push(t);
  }
  console.log('NBA confs object keys:', Object.keys(confs), Object.values(confs).map(c=>({name:c.name,abbr:c.abbr,count:c.teams.length})));

  const confKeys = Object.keys(confs);
  if (confKeys.length < 2) return d;

  let eastKey = confKeys.find(k => /east/i.test(confs[k].name||'') || /^east$/i.test(confs[k].abbr||''));
  let westKey = confKeys.find(k => /west/i.test(confs[k].name||'') || /^west$/i.test(confs[k].abbr||''));
  if (!eastKey && !westKey) { westKey = confKeys[0]; eastKey = confKeys[1]; }
  else if (!eastKey) { eastKey = confKeys.find(k => k !== westKey) || confKeys[1]; }
  else if (!westKey) { westKey = confKeys.find(k => k !== eastKey) || confKeys[0]; }
  if (eastKey === westKey) { eastKey = confKeys[0]; westKey = confKeys[1]; }
  console.log('NBA conf keys — east:', eastKey, confs[eastKey]?.name, '| west:', westKey, confs[westKey]?.name);

  function makeSeries(t1, t2, s1, s2) {
    const isTbd = !t1 || !t2 || (t2 && t2.playIn);
    if (t1) LOGO_CACHE[t1.name] = t1.logoUrl;
    if (t2 && !t2.playIn) LOGO_CACHE[t2.name] = t2.logoUrl;
    return {
      t1: t1?.name||'TBD', s1,
      t2: t2?.playIn ? 'Play-In ('+s2+')' : (t2?.name||'TBD'), s2,
      w1:0,w2:0,st:'pending',
      tbd: !t1,
      tbd2: !!(t2?.playIn),
      games:[],
      logo1: t1?.logoUrl||null,
      logo2: t2?.playIn ? null : (t2?.logoUrl||null),
      projected:true,
    };
  }

  function fillSide(confKey, side, confLetter) {
    const teams = confs[confKey].teams.sort((a,b) => b.pct - a.pct);
    const [s1,s2,s3,s4,s5,s6] = teams;
    const playIn8 = { playIn: true };
    side.r1[0] = makeSeries(s1, playIn8,  `${confLetter}1`, `${confLetter}8`);
    side.r1[1] = makeSeries(s2, {playIn:true}, `${confLetter}2`, `${confLetter}7`);
    side.r1[2] = makeSeries(s3, s6,        `${confLetter}3`, `${confLetter}6`);
    side.r1[3] = makeSeries(s4, s5,        `${confLetter}4`, `${confLetter}5`);
  }

  fillSide(westKey, d.L, 'W');
  fillSide(eastKey, d.R, 'E');
  return d;
}

/* ── BUILD PLAYOFF BRACKET FROM LIVE ESPN GAMES ──
   Uses ESPN competition.series.type (round info) and team conference
   to correctly place teams into L (East/top conf) and R (West/bottom conf).
*/
function buildPlayoffBracket(events, trophy, label) {
  const d = emptyBracket();
  d.mode   = 'playoffs';
  d.trophy = trophy;
  d.label  = label;

  /* ── Step 1: build per-series data from all game events ── */
  /* key: sorted "TEAMA|TEAMB", value: { winsMap, games, isLive, logos, round, conf } */
  const seriesMap = {};

  for (const ev of events) {
    const comp = ev.competitions?.[0];
    if (!comp) continue;
    const isLive = comp.status?.type?.state === 'in';
    const isDone = !!(comp.status?.type?.completed);
    const comps  = comp.competitors || [];
    if (comps.length < 2) continue;

    const home = comps.find(c=>c.homeAway==='home') || comps[0];
    const away = comps.find(c=>c.homeAway==='away') || comps[1];
    const hName = home.team?.displayName || home.team?.name || '';
    const aName = away.team?.displayName || away.team?.name || '';
    if (!hName || !aName) continue;

    /* Logo: prefer team logo array, fall back to abbreviation-based URL */
    const hAbbr = home.team?.abbreviation || '';
    const aAbbr = away.team?.abbreviation || '';
    const hLogo = home.team?.logos?.[0]?.href || `https://a.espncdn.com/i/teamlogos/${trophy==='🏒'?'nhl':'nba'}/500/${hAbbr.toLowerCase()}.png`;
    const aLogo = away.team?.logos?.[0]?.href || `https://a.espncdn.com/i/teamlogos/${trophy==='🏒'?'nhl':'nba'}/500/${aAbbr.toLowerCase()}.png`;
    LOGO_CACHE[hName] = hLogo;
    LOGO_CACHE[aName] = aLogo;

    /* Conference: from team's groups or from event's notes/groups */
    const hConf = home.team?.groups?.parent?.abbreviation
      || home.team?.conferenceId
      || ev.competitions?.[0]?.notes?.[0]?.headline
      || '';
    const aConf = away.team?.groups?.parent?.abbreviation || away.team?.conferenceId || '';

    /* Round number: from series type or season type */
    const roundNum = comp.series?.type?.id
      || comp.type?.id
      || ev.season?.slug?.match(/round-(\d)/)?.[1]
      || '1';

    const key = [hName, aName].sort().join('|');
    if (!seriesMap[key]) {
      seriesMap[key] = {
        winsMap: {}, games: [], isLive: false,
        logos: {}, round: parseInt(roundNum)||1,
        firstDate: ev.date || '',
        hName, aName, hConf, aConf,
        homeTeam: home.team, awayTeam: away.team,
      };
    }
    const entry = seriesMap[key];
    if (isLive) entry.isLive = true;
    if (ev.date && (!entry.firstDate || ev.date < entry.firstDate)) entry.firstDate = ev.date;
    entry.logos[hName] = hLogo;
    entry.logos[aName] = aLogo;

    /* Series wins from the ESPN series object */
    if (comp.series?.competitors) {
      for (const sc of comp.series.competitors) {
        const nm = sc.team?.displayName || sc.team?.name;
        if (nm) entry.winsMap[nm] = Math.max(entry.winsMap[nm]||0, parseInt(sc.wins)||0);
      }
    }

    /* Overtime detection */
    let otLabel = '';
    const detail = comp.status?.type?.shortDetail || '';
    if (/2OT/i.test(detail)) otLabel='2OT';
    else if (/OT|overtime/i.test(detail)) otLabel='OT';

    if (isDone || isLive) {
      entry.games.push({
        homeName: hName, awayName: aName,
        homeScore: parseInt(home.score)||0, awayScore: parseInt(away.score)||0,
        isLive, otLabel, date: ev.date||'',
      });
    }
  }

  /* Sort game logs by date within each series */
  for (const key of Object.keys(seriesMap)) {
    seriesMap[key].games.sort((a,b) => a.date < b.date ? -1 : 1);
  }

  /* ── Step 2: group series by round ── */
  const allSeries = Object.values(seriesMap);

  /* Sort by round then by first game date */
  allSeries.sort((a,b) => {
    if (a.round !== b.round) return a.round - b.round;
    return a.firstDate < b.firstDate ? -1 : 1;
  });

  const r1All = allSeries.filter(s => s.round <= 1 || (s.round === 1));
  const r2All = allSeries.filter(s => s.round === 2);
  const cfAll = allSeries.filter(s => s.round === 3);
  const finAll= allSeries.filter(s => s.round === 4 || s.round >= 4);

  /* If round numbers are unreliable (all come back as 1), fall back to
     grouping by total games played: R1 has most series (8), R2 has 4, etc. */
  const byCount = r1All.length > 6; /* 7+ series → probably has real round data */
  const r1 = byCount ? r1All : allSeries.slice(0,8);
  const r2 = byCount ? r2All : allSeries.slice(8,12);
  const cf = byCount ? cfAll : allSeries.slice(12,14);
  const fin= byCount ? finAll: allSeries.slice(14,15);

  /* ── Step 3: try to split R1 into East (L) and West (R) by conference ──
     Detect conference from team names, ESPN group data, or event notes.
     If we can split cleanly into two groups of 4, use that.
     Otherwise fall back to first-half / second-half split. */
  /* Complete conference lookup — every NHL and NBA team mapped to their conference.
     This is static and never changes mid-season, making it far more reliable
     than trying to infer conference from ESPN's inconsistent group fields. */
  const EAST_TEAMS = new Set([
    /* NHL Eastern Conference */
    'Boston Bruins','Buffalo Sabres','Detroit Red Wings','Florida Panthers',
    'Montreal Canadiens','Ottawa Senators','Tampa Bay Lightning','Toronto Maple Leafs',
    'Carolina Hurricanes','Columbus Blue Jackets','New Jersey Devils','New York Islanders',
    'New York Rangers','Philadelphia Flyers','Pittsburgh Penguins','Washington Capitals',
    /* NHL Eastern teams that may use alternate display names */
    'Bruins','Sabres','Red Wings','Panthers','Canadiens','Senators','Lightning',
    'Maple Leafs','Hurricanes','Blue Jackets','Devils','Islanders','Rangers',
    'Flyers','Penguins','Capitals',
    /* NBA Eastern Conference */
    'Atlanta Hawks','Boston Celtics','Brooklyn Nets','Charlotte Hornets',
    'Chicago Bulls','Cleveland Cavaliers','Detroit Pistons','Indiana Pacers',
    'Miami Heat','Milwaukee Bucks','New York Knicks','Orlando Magic',
    'Philadelphia 76ers','Toronto Raptors','Washington Wizards',
  ]);

  function getConf(s) {
    /* Check stored conference data from ESPN (most reliable) */
    if (s.hConf && /east/i.test(s.hConf)) return 'east';
    if (s.hConf && /west/i.test(s.hConf)) return 'west';
    if (s.aConf && /east/i.test(s.aConf)) return 'east';
    if (s.aConf && /west/i.test(s.aConf)) return 'west';
    /* Fall back to complete team-name lookup */
    if (EAST_TEAMS.has(s.hName) || EAST_TEAMS.has(s.aName)) return 'east';
    return 'west';
  }

  const eastR1 = r1.filter(s => getConf(s) === 'east');
  const westR1 = r1.filter(s => getConf(s) === 'west');

  /* Always use detected conference lists. If one side is short, pad with remaining series. */
  const leftR1  = westR1.length > 0 ? westR1.slice(0,4) : r1.slice(0,4);
  const rightR1 = eastR1.length > 0 ? eastR1.slice(0,4) : r1.slice(4,8);

  /* ── Step 4: helper to convert a series entry into a matchup object ── */
  function makeSeries(s, s1override, s2override) {
    if (!s) return {t1:'TBD',s1:'',t2:'TBD',s2:'',w1:0,w2:0,st:'pending',tbd:true,games:[],logo1:null,logo2:null};
    const w1 = s.winsMap[s.hName]||0;
    const w2 = s.winsMap[s.aName]||0;
    const games = s.games.map(g => ({
      t1Score: g.homeName===s.hName ? g.homeScore : g.awayScore,
      t2Score: g.homeName===s.hName ? g.awayScore : g.homeScore,
      isLive: g.isLive, ot: g.otLabel,
    }));
    let st = 'pending';
    if (s.isLive) st = 'live';
    else if (w1===4||w2===4) st = 'done';
    else if (w1>0||w2>0) st = 'pending';
    return {
      t1: s.hName, s1: s1override||s.hName.slice(0,3).toUpperCase(),
      t2: s.aName, s2: s2override||s.aName.slice(0,3).toUpperCase(),
      w1, w2, st, tbd:false, games,
      logo1: s.logos[s.hName]||null,
      logo2: s.logos[s.aName]||null,
    };
  }

  /* ── Step 5: populate bracket slots ── */
  for (let i=0;i<4;i++) d.L.r1[i] = makeSeries(leftR1[i]);
  for (let i=0;i<4;i++) d.R.r1[i] = makeSeries(rightR1[i]);

  const eastR2 = r2.filter(s => getConf(s) === 'east');
  const westR2 = r2.filter(s => getConf(s) === 'west');
  const leftR2  = westR2.length >= 1 ? westR2.slice(0,2) : r2.slice(0,2);
  const rightR2 = eastR2.length >= 1 ? eastR2.slice(0,2) : r2.slice(2,4);
  for (let i=0;i<2;i++) { if(leftR2[i])  d.L.r2[i] = makeSeries(leftR2[i]); }
  for (let i=0;i<2;i++) { if(rightR2[i]) d.R.r2[i] = makeSeries(rightR2[i]); }

  const eastCF = cf.filter(s => getConf(s) === 'east');
  const westCF = cf.filter(s => getConf(s) === 'west');
  if (westCF[0]||cf[0]) d.L.cf[0] = makeSeries(westCF[0]||cf[0]);
  if (eastCF[0]||cf[1]) d.R.cf[0] = makeSeries(eastCF[0]||cf[1]);

  if (fin[0]) d.final = makeSeries(fin[0], 'West', 'East');

  /* Run winner promotion for any completed series */
  applyWinnerPromotion(d);

  return d;
}

/* ── WINNER PROMOTION ── */
function applyWinnerPromotion(side) {
  function winner(m) {
    if (m.w1===4) return {name:m.t1, seed:m.s1, logo:m.logo1};
    if (m.w2===4) return {name:m.t2, seed:m.s2, logo:m.logo2};
    return null;
  }
  function place(target, slot, w) {
    if (!w) return;
    LOGO_CACHE[w.name] = w.logo;
    if (slot==='t1') { target.t1=w.name; target.s1=w.seed; target.tbd=false; target.tbd1=false; target.logo1=w.logo; }
    else             { target.t2=w.name; target.s2=w.seed; target.tbd=false; target.tbd2=false; target.logo2=w.logo; }
  }
  for (const lr of ['L','R']) {
    const s = side[lr];
    place(s.r2[0],'t1',winner(s.r1[0])); place(s.r2[0],'t2',winner(s.r1[1]));
    place(s.r2[1],'t1',winner(s.r1[2])); place(s.r2[1],'t2',winner(s.r1[3]));
    place(s.cf[0],'t1',winner(s.r2[0])); place(s.cf[0],'t2',winner(s.r2[1]));
  }
  place(side.final,'t1',winner(side.L.cf[0]));
  place(side.final,'t2',winner(side.R.cf[0]));
}

/* ── MAIN DATA LOADER ──
   1. Compute playoff year from the current date (no API call needed).
   2. Try to fetch playoff games (seasontype=3).
      If events exist → playoffs are live → build real bracket.
   3. If no playoff events → regular season → build projected bracket
      from current standings.
   4. If standings also empty → offseason placeholder.
*/
async function loadLeague(sport, league, trophy, label) {
  const year = getPlayoffYear();

  /* Fetch standings and playoff events in parallel */
  let standings = [], playoffEvents = [];
  await Promise.all([
    fetchStandings(sport, league)
      .then(s => { standings = s; })
      .catch(e => console.warn(league + ' standings fetch failed:', e.message)),
    fetchPlayoffGames(sport, league)
      .then(e => { playoffEvents = e; })
      .catch(e => console.warn(league + ' playoff fetch failed:', e.message)),
  ]);

  /* Build the base bracket from standings (always correct team assignment) */
  const buildBase = () => {
    if (!standings.length) return null;
    const b = league === 'nhl'
      ? buildNHLProjected(standings, year)
      : buildNBAProjected(standings, year);
    b.year = year;
    return b;
  };

  if (playoffEvents.length > 0) {
    const liveBracket = buildPlayoffBracket(playoffEvents, trophy, label);
    const liveR1Count = liveBracket.L.r1.filter(s=>!s.tbd).length
                      + liveBracket.R.r1.filter(s=>!s.tbd).length;

    if (liveR1Count >= 8) {
      /* Full bracket from live data */
      liveBracket.year = year;
      return liveBracket;
    }

    /* Partial — start from standings bracket and overlay live scores */
    const base = buildBase();
    if (base) {
      base.mode = 'playoffs';
      overlayLiveScores(base, liveBracket);
      return base;
    }

    liveBracket.year = year;
    return liveBracket;
  }

  /* No playoff events — regular season or early playoffs with no games yet */
  const base = buildBase();
  if (base) return base;

  /* Offseason / no data */
  const d = emptyBracket();
  d.mode = 'offseason'; d.year = year; d.trophy = trophy; d.label = label;
  return d;
}

/* Copy live series wins/scores from liveBracket onto matching series in base.
   Also resolves play-in placeholder slots (tbd2=true) by finding the live
   series whose known team matches the seed-1..6 team in that slot. */
function overlayLiveScores(base, live) {
  function key(m) { return [m.t1,m.t2].filter(t=>t&&t!=='TBD'&&!t.startsWith('Play-In')).sort().join('|'); }

  /* Build live series map keyed two ways:
     1. sorted pair of both real team names (for normal matches)
     2. single real team name (for resolving play-in slots) */
  const liveByPair = {};
  const liveBySeed = {}; /* key = known non-playin team name */

  function indexLive(side) {
    for (const rd of [side.r1,side.r2,side.cf]) {
      for (const m of rd) {
        if (m.tbd) continue;
        const k = key(m);
        if (k) liveByPair[k] = m;
        /* Also index by each team individually for play-in resolution */
        if (m.t1 && !m.t1.startsWith('Play-In')) liveBySeed[m.t1] = m;
        if (m.t2 && !m.t2.startsWith('Play-In')) liveBySeed[m.t2] = m;
      }
    }
  }
  indexLive(live.L); indexLive(live.R);
  if (!live.final.tbd) liveByPair[key(live.final)] = live.final;

  const apply = side => {
    for (const rd of [side.r1,side.r2,side.cf]) {
      for (const m of rd) {
        /* Case 1: normal match — both teams known */
        if (!m.tbd2) {
          const lm = liveByPair[key(m)];
          if (lm) { m.w1=lm.w1; m.w2=lm.w2; m.st=lm.st; m.games=lm.games; m.projected=false; }
        } else {
          /* Case 2: play-in slot — t2 is a placeholder, find live series by t1 */
          const lm = liveBySeed[m.t1];
          if (lm) {
            /* Determine which team in the live series is the play-in winner */
            const playInTeam = lm.t1 === m.t1 ? lm.t2 : lm.t1;
            const playInLogo = lm.t1 === m.t1 ? lm.logo2 : lm.logo1;
            m.t2    = playInTeam;
            m.logo2 = playInLogo || LOGO_CACHE[playInTeam] || null;
            m.tbd2  = false;
            m.tbd   = false;
            m.w1    = lm.w1;
            m.w2    = lm.w2;
            m.st    = lm.st;
            m.games = lm.games;
            m.projected = false;
          }
        }
      }
    }
  };
  apply(base.L); apply(base.R);
  const lf = liveByPair[key(base.final)];
  if (lf) { base.final.w1=lf.w1; base.final.w2=lf.w2; base.final.st=lf.st; base.final.games=lf.games; }

  /* Clear projected flag from all series — playoffs are active */
  const clearProjected = side => {
    for (const rd of [side.r1, side.r2, side.cf])
      for (const m of rd) m.projected = false;
  };
  clearProjected(base.L); clearProjected(base.R);
  base.final.projected = false;

  applyWinnerPromotion(base);
}

/* ── RENDER ── */
function modeBadge(mode) {
  if (mode === 'projected') return '<span class="hdr-mode projected">Projected</span>';
  if (mode === 'playoffs')  return '<span class="hdr-mode live">Live Playoffs</span>';
  return '<span class="hdr-mode offseason">Offseason</span>';
}

function gameLogHTML(m) {
  if (!m.games || m.games.length === 0) return '';
  const a1 = abbr(m.t1), a2 = abbr(m.t2);
  /* Cap at 5 rows — show all games up to 5, or the last 4 + a truncation hint */
  const MAX = 6;
  const games = m.games.length > MAX ? m.games.slice(m.games.length - MAX) : m.games;
  const startIdx = m.games.length > MAX ? m.games.length - MAX : 0;
  const rows = games.map((g, i) => {
    const i_real = startIdx + i;
    const gn  = `G${i_real+1}`;
    const ot  = g.ot ? `<span class="gl-ot">${g.ot}</span>` : '';
    if (g.isLive) {
      /* Live game — show both in green, no winner yet */
      const sc = `<span class="gl-sc"><span class="gl-win">${a1}</span> ${g.t1Score}&#x2013;${g.t2Score} <span class="gl-win">${a2}</span></span>`;
      return `<div class="gl-row glv"><span class="gl-gn">${gn}</span>${sc}${ot}</div>`;
    }
    const t1wins = g.t1Score > g.t2Score;
    const cls = t1wins ? 'gl-row glw' : 'gl-row gll';
    /* Winner abbr bright, loser abbr dim */
    const sc = t1wins
      ? `<span class="gl-sc"><span class="gl-win">${a1}</span> ${g.t1Score}&#x2013;${g.t2Score} <span class="gl-los">${a2}</span></span>`
      : `<span class="gl-sc"><span class="gl-los">${a1}</span> ${g.t1Score}&#x2013;${g.t2Score} <span class="gl-win">${a2}</span></span>`;
    return `<div class="${cls}"><span class="gl-gn">${gn}</span>${sc}${ot}</div>`;
  }).join('');
  return `<div class="gl">${rows}</div>`;
}

function scHTML(m, isFin) {
  const e1=m.w2===4,e2=m.w1===4;
  const l1=m.w1>m.w2&&!e1, l2=m.w2>m.w1&&!e2;
  const uns=m.w1===0&&m.w2===0&&m.st==='pending';
  const iT1=!!(m.tbd||m.tbd1), iT2=!!(m.tbd||m.tbd2);
  const isProj = !!(m.projected);
  let stT, stC;
  if (m.st==='live')      { stT='&#9679;';          stC=' live'; }
  else if (e1||e2)        { stT=`${m.w1}&#x2013;${m.w2} &#9632;`; stC=' done'; }
  else if (uns&&isProj)   { stT='&#9670;';           stC=' proj'; }
  else if (uns)           { stT='';                  stC=''; }
  else                    { stT=`${m.w1}&#x2013;${m.w2}`; stC=''; }
  const c1=e1?'tr elim':l1?'tr lead':iT1?'tr tbd':'tr';
  const c2=e2?'tr elim':l2?'tr lead':iT2?'tr tbd':'tr';
  const cc='sc'+(isFin?' fin':'')+(isProj?' projected':'')+(m.st==='live'?' live':'')+((e1||e2)?' done':'');
  return `<div class="${cc}">
    ${stT?`<span class="ss${stC}">${stT}</span>`:''}
    <div class="${c1}">${logoEl(m.t1,m.logo1,iT1)}<span class="t-sd">${m.s1}</span><span class="t-nm">${m.t1}</span><span class="t-wn">${uns||iT1?'':m.w1}</span></div>
    <div class="sdiv"></div>
    <div class="${c2}">${logoEl(m.t2,m.logo2,iT2)}<span class="t-sd">${m.s2}</span><span class="t-nm">${m.t2}</span><span class="t-wn">${uns||iT2?'':m.w2}</span></div>
    ${gameLogHTML(m)}
  </div>`;
}

function colHTML(series, justify, label) {
  return `<div class="r-col" style="justify-content:${justify}">
    <div class="rl">${label}</div>
    ${series.map(s=>scHTML(s,false)).join('')}
  </div>`;
}

function renderHalf(lgKey, brId, titleId, subId, modeId) {
  const d = D[lgKey];
  if (!d) return;

  /* Update header */
  const isNHL = lgKey === 'nhl';
  const titleEl = document.getElementById(titleId);
  const subEl   = document.getElementById(subId);
  const modeEl  = document.getElementById(modeId);
  if (titleEl) titleEl.textContent = isNHL
    ? `NHL — Stanley Cup Playoffs ${d.year||''}`
    : `NBA Playoffs ${d.year||''}`;
  if (subEl) subEl.textContent = d.mode==='playoffs' ? 'First Round · Best of 7'
    : d.mode==='projected' ? 'Regular Season · Projected Bracket'
    : 'Offseason';
  if (modeEl) modeEl.innerHTML = modeBadge(d.mode);

  const br = document.getElementById(brId);

  if (d.mode === 'offseason') {
    br.innerHTML = '';
    const half = br.closest('.half');
    /* Remove any existing offseason msg */
    const existing = half.querySelector('.offseason-msg');
    if (existing) existing.remove();
    const msg = document.createElement('div');
    msg.className = 'offseason-msg';
    msg.innerHTML = `<div class="om-title">${isNHL?'NHL':'NBA'} ${d.year||''}</div>
      <div class="om-sub">Offseason — Check back when the season begins</div>`;
    half.appendChild(msg);
    return;
  }

  /* Remove offseason msg if switching back */
  const existing = br.closest('.half').querySelector('.offseason-msg');
  if (existing) existing.remove();

  br.innerHTML = `
    <div class="r-col" style="justify-content:space-evenly">
      <div class="conf-lbl">Western Conference</div>
      ${d.L.r1.map(s=>scHTML(s,false)).join('')}
    </div>
    <div class="g"></div>
    ${colHTML(d.L.r2,'space-around','Round 2')}
    <div class="g"></div>
    ${colHTML(d.L.cf,'center','Conf. Final')}
    <div class="gf"></div>
    <div class="cc">
      <div class="troph">${d.trophy}</div>
      <div class="cc-lbl">${d.label}</div>
      ${scHTML(d.final,true)}
    </div>
    <div class="gf"></div>
    ${colHTML(d.R.cf,'center','Conf. Final')}
    <div class="g"></div>
    ${colHTML(d.R.r2,'space-around','Round 2')}
    <div class="g"></div>
    <div class="r-col" style="justify-content:space-evenly">
      <div class="conf-lbl">Eastern Conference</div>
      ${d.R.r1.map(s=>scHTML(s,false)).join('')}
    </div>
  `;
}

function drawConn(halfId, cvId, brId) {
  const half = document.getElementById(halfId);
  const cv   = document.getElementById(cvId);
  cv.width=1280; cv.height=360;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,1280,360);
  ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1;
  const hRect = half.getBoundingClientRect();
  const cols  = Array.from(document.getElementById(brId).children)
    .filter(el=>el.classList.contains('r-col'));
  if (cols.length < 6) return;
  function cards(c){return Array.from(c.querySelectorAll('.sc'));}
  function mY(el){const r=el.getBoundingClientRect();return r.top+r.height/2-hRect.top;}
  function rX(el){const r=el.getBoundingClientRect();return r.right-hRect.left;}
  function lX(el){const r=el.getBoundingClientRect();return r.left-hRect.left;}
  function pairs(from,to,goR){
    for(let i=0;i<to.length;i++){
      const a=from[i*2],b=from[i*2+1],c=to[i];
      if(!a||!b||!c) continue;
      const x1=goR?rX(a):lX(a), y1=mY(a), x2=goR?rX(b):lX(b), y2=mY(b);
      const xc=goR?lX(c):rX(c), yc=mY(c);
      const mid=(x1+xc)/2;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(mid,y1);ctx.lineTo(mid,y2);ctx.lineTo(x2,y2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(mid,yc);ctx.lineTo(xc,yc);ctx.stroke();
    }
  }
  pairs(cards(cols[0]),cards(cols[1]),true);
  pairs(cards(cols[1]),cards(cols[2]),true);
  pairs(cards(cols[5]),cards(cols[4]),false);
  pairs(cards(cols[4]),cards(cols[3]),false);
}

function render() {
  renderHalf('nhl','br-nhl','nhl-title','nhl-sub','nhl-mode-badge');
  renderHalf('nba','br-nba','nba-title','nba-sub','nba-mode-badge');
  requestAnimationFrame(()=>{
    const wp = document.getElementById('wp');
    const saved = wp.style.transform;
    wp.style.transform = 'none';
    drawConn('h-nhl','cv-nhl','br-nhl');
    drawConn('h-nba','cv-nba','br-nba');
    wp.style.transform = saved;
  });
}

/* ── UPDATE ── */
async function updateScores() {
  const ldr  = document.getElementById('ldr');
  const ltxt = document.getElementById('ltxt');
  const stat = document.getElementById('status');
  ldr.classList.add('on'); stat.textContent = ''; ltxt.textContent = 'Detecting active seasons…';
  try {
    ltxt.textContent = 'Fetching NHL data…';
    D.nhl = await loadLeague('hockey','nhl','🏒','Stanley Cup Final');
    console.log('NHL mode:', D.nhl?.mode, '| R1 L series count:', D.nhl?.L?.r1?.filter(s=>!s.tbd).length, '| R1 R:', D.nhl?.R?.r1?.filter(s=>!s.tbd).length);
    ltxt.textContent = 'Fetching NBA data…';
    D.nba = await loadLeague('basketball','nba','🏀','NBA Finals');
    console.log('NBA mode:', D.nba?.mode, '| R1 L series count:', D.nba?.L?.r1?.filter(s=>!s.tbd).length, '| R1 R:', D.nba?.R?.r1?.filter(s=>!s.tbd).length);
    render();
    document.getElementById('f-upd').textContent =
      'UPDATED ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}).toUpperCase();
    const nhlMode = D.nhl?.mode || 'offseason';
    const nbaMode = D.nba?.mode || 'offseason';
    const modeLabel = m => m === 'playoffs' ? 'Live Playoffs'
                         : m === 'projected' ? 'Projected'
                         : 'Offseason';
    stat.textContent = '✓ NHL: ' + modeLabel(nhlMode) + ' ' + (D.nhl?.year||'')
      + '  ·  NBA: ' + modeLabel(nbaMode) + ' ' + (D.nba?.year||'');
    setTimeout(()=>{stat.textContent='';},5000);
  } catch(e) {
    stat.textContent = 'Fetch failed — check internet connection. (' + e.message + ')';
    render();
  } finally {
    ldr.classList.remove('on');
  }
}

/* ── SCREEN / OS DETECTION ── */
function screenRes() {
  const dpr = window.devicePixelRatio || 1;
  return { w: Math.round(window.screen.width*dpr), h: Math.round(window.screen.height*dpr) };
}
function isMac() { return /mac/i.test(navigator.platform) || /mac/i.test(navigator.userAgent); }
function systemBarPx() {
  const dpr = window.devicePixelRatio || 1;
  return isMac() ? Math.round(25*dpr) : 48;
}
function updateButtonLabel() {
  const {w,h} = screenRes();
  const btn = document.getElementById('btn-dl');
  if (btn) btn.textContent = '\u2B07 Download ' + w + '\xD7' + h + ' JPEG';
}

/* ── EXPORT ── */
async function loadHtml2Canvas() {
  if (window.html2canvas) return;
  /* Try CDN sources in order until one loads */
  const srcs = [
    'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
    'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js',
    'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js',
  ];
  for (const src of srcs) {
    try {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
      if (window.html2canvas) return;
    } catch(e) { /* try next */ }
  }
  throw new Error('Could not load html2canvas from any source. Try disabling tracking prevention for localhost in your browser settings.');
}

async function exportWP() {
  const stat = document.getElementById('status');
  const {w:outW, h:outH} = screenRes();
  const barH  = systemBarPx();
  const onMac = isMac();
  stat.textContent = 'Loading export library…';
  try {
    await loadHtml2Canvas();
  } catch(e) {
    stat.textContent = e.message;
    return;
  }
  stat.textContent = 'Rendering ' + outW + '\xD7' + outH + ' JPEG\u2026';
  const el = document.getElementById('wp');
  const savedT = el.style.transform;
  const savedO = el.style.transformOrigin;
  el.style.transform = 'none';
  el.style.transformOrigin = 'top left';
  try {
    const captureScale = outW / 1280;
    const c = await html2canvas(el, {
      backgroundColor:'#070910', scale:captureScale,
      width:1280, height:720, useCORS:true, allowTaint:true, logging:false,
    });
    const out = document.createElement('canvas');
    out.width=outW; out.height=outH;
    const octx = out.getContext('2d');
    octx.fillStyle='#000000';
    octx.fillRect(0,0,outW,outH);
    const contentH = outH - barH;
    if (onMac) octx.drawImage(c, 0, barH, outW, contentH);
    else       octx.drawImage(c, 0, 0,    outW, contentH);
    const a = document.createElement('a');
    a.download = 'playoffs-wallpaper-' + new Date().toISOString().slice(0,10) + '.jpg';
    a.href = out.toDataURL('image/jpeg', 0.92);
    a.click();
    stat.textContent = '\u2713 Saved! (' + outW + '\xD7' + outH + ')';
    setTimeout(()=>{stat.textContent='';},3000);
  } catch(e) {
    stat.textContent = 'Export failed \u2014 try a screenshot tool.';
  } finally {
    el.style.transform = savedT;
    el.style.transformOrigin = savedO;
  }
}

/* ── SCALE TO FIT 90% OF VIEWPORT ── */
function scaleWP() {
  const toolbar = document.querySelector('.toolbar');
  const status  = document.getElementById('status');
  const scaler  = document.getElementById('wp-scaler');
  const tbH  = toolbar ? toolbar.offsetHeight : 0;
  const stH  = status  ? status.offsetHeight  : 0;
  const gaps = 24;
  const taskbar = 48;
  const availW = window.innerWidth;
  const availH = window.innerHeight - tbH - stH - gaps - taskbar;
  const scale  = Math.min((availW*0.90)/1280, (availH*0.90)/720);
  const scaledW = Math.round(1280*scale);
  const scaledH = Math.round(720*scale);
  scaler.style.width    = scaledW + 'px';
  scaler.style.height   = scaledH + 'px';
  scaler.style.overflow = 'visible';
  const wp = document.getElementById('wp');
  wp.style.transform       = `scale(${scale})`;
  wp.style.transformOrigin = 'top left';
}

function renderAndScale() {
  render();
  const wp = document.getElementById('wp');
  const saved = wp.style.transform;
  wp.style.transform = 'none';
  drawConn('h-nhl','cv-nhl','br-nhl');
  drawConn('h-nba','cv-nba','br-nba');
  wp.style.transform = saved;
  scaleWP();
}

/* ── INIT ── */
D.nhl = emptyBracket();
D.nhl.trophy = '🏒'; D.nhl.label = 'Stanley Cup Final';
D.nba = emptyBracket();
D.nba.trophy = '🏀'; D.nba.label = 'NBA Finals';
renderAndScale();
updateButtonLabel();

/* Auto-load on startup */
updateScores();

window.addEventListener('resize', () => {
  scaleWP();
  const wp = document.getElementById('wp');
  const saved = wp.style.transform;
  wp.style.transform = 'none';
  drawConn('h-nhl','cv-nhl','br-nhl');
  drawConn('h-nba','cv-nba','br-nba');
  wp.style.transform = saved;
});
</script>
